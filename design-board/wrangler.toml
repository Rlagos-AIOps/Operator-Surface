name = "operator-surface-board"
main = "worker/worker.ts"
compatibility_date = "2024-12-30"
assets = { not_found_handling = "single-page-application" }
preview_urls = true
workers_dev = true

[observability]
enabled = true

# Deployed to *.workers.dev (no custom domain). To serve on your own Cloudflare
# zone instead, add a [[routes]] block with your pattern + zone_name here.

# Set up the durable object used for each tldraw room
[durable_objects]
bindings = [{ name = "AGENT_DURABLE_OBJECT", class_name = "AgentDurableObject" }]

# Durable objects require migrations. Cloudflare's free plan requires
# SQLite-backed DOs (new_sqlite_classes). This is the worker's first deploy,
# so we create AgentDurableObject directly as a SQLite-backed class.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDurableObject"]
