<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Decision Trace — AI Ops OS</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    background: var(--bg-deep);
    color: var(--paper-text);
    font-family: var(--font-sans);
    padding: 32px;
  }
  .stage-wrap {
    display: grid;
    grid-template-columns: minmax(0, auto) 1fr;
    gap: 32px;
    align-items: start;
    max-width: 1840px;
    margin: 0 auto;
  }
  .label-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: minmax(0, auto) 1fr;
    gap: 32px;
    margin-bottom: 12px;
  }
  .label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--lime);
  }
  .label-sub { color: var(--muted); margin-left: 8px; font-weight: 500; letter-spacing: 0.04em; text-transform: none; }
  /* Mobile artboard frame */
  .mobile-shell {
    width: 402px; height: 874px;
    background: #0A1410; border-radius: 56px;
    padding: 12px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(244,241,232,0.08);
  }
  .mobile-screen {
    width: 100%; height: 100%; border-radius: 44px; overflow: hidden;
    background: var(--bg); position: relative;
  }
  /* Desktop artboard frame */
  .desktop-shell {
    width: 100%; min-width: 1280px; height: 874px;
    background: var(--bg);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(244,241,232,0.08);
    display: flex;
  }
  button:hover { filter: brightness(1.05); }
  button:active { transform: scale(0.98); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(244,241,232,0.16) transparent; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(244,241,232,0.16); border-radius: 3px; }

  /* Empty-state confetti dots */
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.45; }
    50% { transform: translateY(-6px) rotate(8deg); opacity: 0.85; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="dm-data.js?v=4"></script>

// ───────────────────── EMPTY-STATE (mobile reward) ─────────────────────
const MobileEmptyState = () => {

          background: 'transparent', color: 'var(--paper-text)',

      </div>

      {/* Confetti backdrop */}
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0 }}>
        {dots.map(i => {
          const colors = ['var(--lime)', 'var(--volt)', 'var(--paper)', 'var(--lime-deep)'];
          const color = colors[i % colors.length];
          const size = 6 + (i % 3) * 4;
          const left = (i * 137) % 90 + 5;
          const top = 18 + (i * 91) % 60;
          const delay = (i * 0.27) % 2.5;
          const shape = i % 3 === 0 ? '50%' : i % 3 === 1 ? '2px' : '50%';
          return (
            <div key={i} style={{
              position: 'absolute',
              left: left + '%', top: top + '%',
              width: size, height: size, borderRadius: shape,
              background: i % 4 === 3 ? 'transparent' : color,
              border: i % 4 === 3 ? `1.5px dotted ${color}` : 'none',
              animation: `drift 2.8s ${delay}s ease-in-out infinite`,
              opacity: 0.6,
            }}/>

      {/* Body */}
      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        padding: '20px 32px', position: 'relative', zIndex: 1,
      }}>
        {/* Trophy bubble */}

        {/* Today receipt — small editorial card */}

          border: '1px solid var(--surface-edge)',

                <span style={{
                  fontVariantNumeric: 'tabular-nums', fontWeight: 600,

      {/* Footer */}

        padding: '12px 18px 28px',
        borderTop: '1px solid rgba(244,241,232,0.06)',
        background: 'var(--bg-deep)',
        position: 'relative', zIndex: 1,

          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <i data-lucide="history" style={{ width: 14, height: 14 }}></i>

          </p>
          <p style={{ margin: '0 0 12px', color: 'var(--muted)' }}>
            Rationale: only one workspace section (Inbox) is shippable in v1. The other five (Pipeline, Clients, Scoping, ROI Pricing, Agents) are SOON. A bottom-tab bar would advertise dead-ends; a hamburger keeps them discoverable on tap without consuming permanent real estate. The bottom of the screen is reserved for the primary action — Approve-all on the queue, Approve & Send on the trace.
          </p>
          <p style={{ margin: 0, color: 'var(--muted)' }}>
            Once Pipeline + Agents both ship as full mobile surfaces, we revisit and likely promote to a 3-tab bottom bar (Inbox · Pipeline · Agents).
          </p>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
