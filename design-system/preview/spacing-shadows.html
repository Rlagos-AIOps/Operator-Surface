<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Elevation — shadows &amp; glows</div>
<div style="display:flex; gap:18px; padding:8px;">
  <div style="flex:1; background:#245F37; height:90px; border-radius:14px; box-shadow: 0 1px 0 rgba(10,20,16,0.20), 0 0 0 1px rgba(58,128,82,0.35); display:flex; align-items:flex-end; padding:10px;"><span class="mono">shadow-1</span></div>
  <div style="flex:1; background:#245F37; height:90px; border-radius:14px; box-shadow: 0 6px 18px rgba(10,20,16,0.30), 0 0 0 1px rgba(58,128,82,0.40); display:flex; align-items:flex-end; padding:10px;"><span class="mono">shadow-2</span></div>
  <div style="flex:1; background:#245F37; height:90px; border-radius:14px; box-shadow: 0 18px 40px rgba(10,20,16,0.45), 0 0 0 1px rgba(58,128,82,0.50); display:flex; align-items:flex-end; padding:10px;"><span class="mono">shadow-3</span></div>
  <div style="flex:1; background:#C8F902; height:90px; border-radius:14px; box-shadow: 0 0 0 4px rgba(200,249,2,0.20), 0 0 24px rgba(200,249,2,0.45); display:flex; align-items:flex-end; padding:10px;"><span class="mono" style="color:#0A1410;">glow-volt</span></div>
</div>
</div></body></html>
