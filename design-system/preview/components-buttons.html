<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Components — buttons</div>
<div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
  <button style="background:#D9E879; color:#0A1410; border:none; font-family:var(--font-sans); font-weight:700; font-size:14px; padding:12px 22px; border-radius:8px; cursor:pointer;">Approve reply</button>
  <button style="background:#C8F902; color:#0A1410; border:none; font-family:var(--font-sans); font-weight:700; font-size:14px; padding:12px 22px; border-radius:8px; box-shadow: 0 0 0 4px rgba(200,249,2,0.20), 0 0 24px rgba(200,249,2,0.45);">Live · agent active</button>
  <button style="background:transparent; color:#F4F1E8; border:1px solid rgba(244,241,232,0.28); font-family:var(--font-sans); font-weight:600; font-size:14px; padding:11px 20px; border-radius:8px;">Revise</button>
  <button style="background:transparent; color:#F4F1E8; border:none; font-family:var(--font-sans); font-weight:600; font-size:14px; padding:11px 16px;">Cancel</button>
  <button style="background:#D9402B; color:#F4F1E8; border:none; font-family:var(--font-sans); font-weight:700; font-size:14px; padding:12px 22px; border-radius:8px;">Reject</button>
</div>
<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;">
  <span style="background:rgba(217,232,121,0.12); color:#C8F902; padding:6px 12px; border-radius:9999px; font-size:12px; font-weight:600; border:1px solid rgba(217,232,121,0.4);">High intent</span>
  <span style="background:rgba(244,241,232,0.06); color:#8FA89A; padding:6px 12px; border-radius:9999px; font-size:12px; font-weight:600;">Cold</span>
  <span style="background:rgba(232,169,28,0.12); color:#E8A91C; padding:6px 12px; border-radius:9999px; font-size:12px; font-weight:600;">Needs review</span>
</div>
</div></body></html>
