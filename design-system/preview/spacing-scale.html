<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Spacing — 8pt grid</div>
<div style="display:flex; gap:14px; align-items:flex-end;">
  <div style="text-align:center;"><div style="background:var(--lime); width:4px; height:4px;"></div><div class="mono" style="margin-top:8px;">4</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:8px; height:8px;"></div><div class="mono" style="margin-top:8px;">8</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:12px; height:12px;"></div><div class="mono" style="margin-top:8px;">12</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:16px; height:16px;"></div><div class="mono" style="margin-top:8px;">16</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:24px; height:24px;"></div><div class="mono" style="margin-top:8px;">24</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:32px; height:32px;"></div><div class="mono" style="margin-top:8px;">32</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:48px; height:48px;"></div><div class="mono" style="margin-top:8px;">48</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:64px; height:64px;"></div><div class="mono" style="margin-top:8px;">64</div></div>
  <div style="text-align:center;"><div style="background:var(--lime); width:96px; height:96px;"></div><div class="mono" style="margin-top:8px;">96</div></div>
</div>
</div></body></html>
