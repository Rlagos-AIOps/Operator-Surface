<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Components — inputs</div>
<div style="display:flex; flex-direction:column; gap:12px; max-width:520px;">
  <div>
    <div class="label" style="margin-bottom:6px;">SCOPE NAME</div>
    <input value="Q3 inbound triage pilot" style="width:100%; background:#163F23; border:1px solid #3A8052; color:#F4F1E8; padding:12px 14px; border-radius:8px; font-family:var(--font-sans); font-size:14px; box-shadow:inset 0 1px 0 rgba(0,0,0,0.25);"/>
  </div>
  <div>
    <div class="label" style="margin-bottom:6px;">DRAFT REPLY</div>
    <textarea rows="3" style="width:100%; background:#163F23; border:1px solid #C8F902; color:#F4F1E8; padding:12px 14px; border-radius:8px; font-family:var(--font-sans); font-size:14px; box-shadow:inset 0 1px 0 rgba(0,0,0,0.25), 0 0 0 4px rgba(200,249,2,0.15); resize:none;">Happy to chat. Two quick questions before we book time…</textarea>
  </div>
  <div style="display:flex; gap:10px;">
    <select style="flex:1; background:#163F23; border:1px solid #3A8052; color:#F4F1E8; padding:12px 14px; border-radius:8px; font-family:var(--font-sans); font-size:14px;"><option>Mid-market · $4-12k MRR</option></select>
    <input type="checkbox" id="t" checked style="appearance:none; width:20px; height:20px; border-radius:4px; background:#D9E879; cursor:pointer; position:relative;"/>
  </div>
</div>
</div></body></html>
