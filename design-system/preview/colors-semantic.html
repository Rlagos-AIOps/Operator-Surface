<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Semantic — status</div>
<div class="row" style="gap:12px">
  <div style="flex:1; padding:14px; border-radius:10px; background:#D9E879; color:#0A1410;">
    <div style="font-weight:700; margin-bottom:4px;">Success</div>
    <div class="mono" style="color:#0A1410;">#D9E879</div>
  </div>
  <div style="flex:1; padding:14px; border-radius:10px; background:#E8A91C; color:#0A1410;">
    <div style="font-weight:700; margin-bottom:4px;">Warning</div>
    <div class="mono" style="color:#0A1410;">#E8A91C</div>
  </div>
  <div style="flex:1; padding:14px; border-radius:10px; background:#D9402B; color:#F4F1E8;">
    <div style="font-weight:700; margin-bottom:4px;">Danger</div>
    <div class="mono" style="color:#F4F1E8;">#D9402B</div>
  </div>
  <div style="flex:1; padding:14px; border-radius:10px; background:#6FB4D9; color:#0A1410;">
    <div style="font-weight:700; margin-bottom:4px;">Info</div>
    <div class="mono" style="color:#0A1410;">#6FB4D9</div>
  </div>
</div>
</div></body></html>
