<!doctype html>
<html><head><meta charset="utf-8"><title>Text colors</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Text — on dark &amp; on paper</div>
<div class="row" style="gap:14px">
  <div style="flex:1; background:#1E5631; padding:18px; border-radius:14px; border:1px solid #3A8052;">
    <div style="color:#F4F1E8; font-size:18px; margin-bottom:4px;">Paper text · primary</div>
    <div style="color:#8FA89A; font-size:14px; margin-bottom:10px;">Muted · #8FA89A</div>
    <div class="mono">--paper-text · --muted</div>
  </div>
  <div style="flex:1; background:#F4F1E8; padding:18px; border-radius:14px;">
    <div style="color:#0A1410; font-size:18px; margin-bottom:4px;">Ink · primary</div>
    <div style="color:#5A6E62; font-size:14px; margin-bottom:10px;">Muted on light · #5A6E62</div>
    <div class="mono" style="color:#5A6E62;">--ink · --muted-light</div>
  </div>
</div>
</div></body></html>
