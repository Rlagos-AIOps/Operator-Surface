<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="eyebrow">Components — cards on canvas</div>
<div style="display:flex; gap:14px;">
  <div style="flex:1; background:#245F37; border-radius:14px; padding:18px; box-shadow: 0 1px 0 rgba(10,20,16,0.20), 0 0 0 1px rgba(58,128,82,0.35);">
    <div class="label" style="color:#8FA89A; margin-bottom:6px;">PIPELINE</div>
    <div style="font-family:var(--font-serif); font-size:36px; line-height:1; letter-spacing:-0.02em;">42</div>
    <div style="color:#8FA89A; font-size:13px; margin-top:4px;">active threads</div>
  </div>
  <div style="flex:1; background:#245F37; border-radius:14px; padding:18px; box-shadow: 0 6px 18px rgba(10,20,16,0.30), 0 0 0 1px rgba(58,128,82,0.40);">
    <div class="label" style="color:var(--lime); margin-bottom:6px;">AGENT · ACTIVE</div>
    <div style="font-family:var(--font-serif); font-size:36px; line-height:1; letter-spacing:-0.02em; color:#C8F902;">7</div>
    <div style="color:#8FA89A; font-size:13px; margin-top:4px;">drafts pending review</div>
  </div>
  <div style="flex:1; background:#F4F1E8; color:#0A1410; border-radius:14px; padding:18px;">
    <div class="label" style="color:#5A6E62; margin-bottom:6px;">ROI · LOCKED</div>
    <div style="font-family:var(--font-serif); font-size:36px; line-height:1; letter-spacing:-0.02em;">$4,200</div>
    <div style="color:#5A6E62; font-size:13px; margin-top:4px;">monthly · 3.2× est.</div>
  </div>
</div>
</div></body></html>
